<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScanPlan HVAC - Updates</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            line-height: 1.6;
        }
        h1 {
            color: #007AFF;
            margin-bottom: 40px;
        }
        .release {
            border-left: 4px solid #007AFF;
            padding: 20px;
            margin-bottom: 30px;
            background: #f9f9f9;
            border-radius: 4px;
        }
        .release-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .release-title {
            font-size: 1.4em;
            font-weight: bold;
            color: #333;
        }
        .release-tag {
            background: #007AFF;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.9em;
        }
        .release-date {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 15px;
        }
        .release-notes {
            white-space: pre-wrap;
            color: #444;
        }
        .commit-message {
            font-weight: 600;
            margin-bottom: 5px;
        }
        .commit-hash {
            font-family: monospace;
            font-size: 0.85em;
            color: #888;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>📱 ScanPlan HVAC Updates</h1>
    <div id="updates" class="loading">Loading updates...</div>

<script>
    // Fetches commits.json from your public repo (synced automatically via GitHub Action)
    fetch('commits.json')
        .then(response => {
            if (!response.ok) throw new Error('Failed to load commits');
            return response.json();
        })
        .then(commits => {
            const updatesDiv = document.getElementById('updates');

            const html = commits.map(commit => {
                const date = new Date(commit.date).toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });

                return `
                    <div class="release">
                        <div class="release-date">${date}</div>
                        <div class="commit-message">${commit.message}</div>
                        <span class="commit-hash">${commit.hash}</span>
                    </div>
                `;
            }).join('');

            updatesDiv.innerHTML = html;
        })
        .catch(error => {
            console.error('Error loading updates:', error);
            document.getElementById('updates').innerHTML =
                '<p style="color: red;">Error loading updates. Please try again later.</p>';
        });
</script>
</body>
</html>
